name: Analyzer fingerprint tests

on:
  push:
    branches: [main]
    paths:
      - 'Tools/analysis-workbook.html'
      - 'Tools/_test_corpus/**'
      - '.github/workflows/analyzer-tests.yml'
  pull_request:
    paths:
      - 'Tools/analysis-workbook.html'
      - 'Tools/_test_corpus/**'
      - '.github/workflows/analyzer-tests.yml'

permissions:
  contents: read

jobs:
  fingerprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install exceljs
        working-directory: Tools/_test_corpus
        run: |
          echo '{"type":"module"}' > package.json
          npm install exceljs --no-save --silent

      - name: Run fingerprint tests
        working-directory: Tools/_test_corpus
        run: node run-fingerprint-tests.mjs
