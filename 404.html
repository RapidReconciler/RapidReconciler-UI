<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting — RapidReconciler</title>
  <script>
    /* GitHub Pages serves this file for any 404 in the repo.
       Repairs URLs where the /RapidReconciler-UI/ repo prefix was dropped —
       e.g. a bookmark to  https://rapidreconciler.github.io/RRUniversity/foo.html
       gets redirected to  https://rapidreconciler.github.io/RapidReconciler-UI/RRUniversity/foo.html */
    (function () {
      var REPO = '/RapidReconciler-UI';
      var path = window.location.pathname;

      // If the repo prefix is already there, nothing to fix — let it 404 naturally.
      if (path.startsWith(REPO + '/') || path === REPO) return;

      // Strip any leading slash so we can rebuild cleanly.
      var stripped = path.replace(/^\//, '');

      // Redirect to the correct path, preserving any query string or hash.
      var target = 'https://rapidreconciler.github.io' +
                   REPO + '/' + stripped +
                   window.location.search +
                   window.location.hash;

      window.location.replace(target);
    }());
  </script>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f6f8fb; }
    .card { background: #fff; border: 1px solid #e1e7ef; border-radius: 12px;
            padding: 40px 48px; text-align: center; max-width: 480px; }
    h1 { margin: 0 0 12px; font-size: 18px; color: #1a2230; }
    p  { margin: 0; color: #5e6a7a; font-size: 14px; line-height: 1.6; }
    a  { color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting&hellip;</h1>
    <p>
      Fixing the URL and sending you to the right page.<br />
      If you aren&rsquo;t redirected automatically, go to the
      <a href="https://rapidreconciler.github.io/RapidReconciler-UI/rapidreconciler-hub.html">
        RapidReconciler Hub
      </a>.
    </p>
  </div>
</body>
</html>
