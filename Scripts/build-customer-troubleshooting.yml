name: Build customer-troubleshooting.html

on:
  push:
    branches: [main]
    paths:
      # Only run when the source or the script itself changes
      - "troubleshooting.html"
      - "scripts/build-customer-troubleshooting.py"
      - ".github/workflows/build-customer-troubleshooting.yml"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  # Required to push the regenerated file back to the branch
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        # Default ref/SHA — we'll commit back to the same branch.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      - name: Run build script
        # The script exits non-zero if a sensitive marker survives, which
        # fails the workflow loudly so the regression is caught.
        run: python scripts/build-customer-troubleshooting.py

      - name: Commit and push if customer file changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- customer-troubleshooting.html; then
            echo "customer-troubleshooting.html unchanged — nothing to commit"
            exit 0
          fi

          git add customer-troubleshooting.html
          git commit -m "Regenerate customer-troubleshooting.html

          Auto-generated by .github/workflows/build-customer-troubleshooting.yml
          from troubleshooting.html. Do not edit by hand."
          git push
