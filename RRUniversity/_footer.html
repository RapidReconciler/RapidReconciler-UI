<!--
  RapidReconciler University - Standard Footer Template
  =====================================================
  Drop this footer into any RR University page. Two parts:

    1. The CSS block goes inside the page's <style> tag.
    2. The HTML block replaces the page's existing <footer>...</footer>.

  Required CSS variables (should already exist in the page's :root):
    --navy-deep:   #142037;
    --blue:        #2b5fb0;
    --blue-bright: #3d8fd6;

  Notes:
    - The page's content wrapper class is `.container`. Keep that.
    - No logo, no nav columns, no decorative shapes. Single thin line.
    - Update the year in &copy; 2026 as needed.
-->


<!-- ============== 1. CSS - paste inside <style> ============== -->
<!--
<style>
  footer {
    background: var(--navy-deep);
    color: rgba(255,255,255,0.7);

    border-top: 3px solid var(--blue);
  }
  .footer-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .footer-line strong { color: #fff; font-weight: 700; }
  .footer-line a {
    color: var(--blue-bright);
    text-decoration: none;
    transition: color 0.15s;
  }
  .footer-line a:hover { color: #fff; }
  .footer-sep { color: rgba(255,255,255,0.25); margin: 0 6px; }

  @media (max-width: 760px) {
    .footer-line { gap: 12px; font-size: 12px; }
  }
</style>
-->
