<!--
  RapidReconciler University - Standard Header Template
  =====================================================
  Drop this header into any RR University doc page. Three parts:

    1. The CSS block goes inside the page's <style> tag.
    2. The TOPNAV HTML goes immediately after <body>.
    3. The PAGE-HEADER HTML goes after the topnav.

  Required CSS variables (should already exist in the page's :root):
    --navy:        #1f2d4a;
    --navy-soft:   #2c3e63;
    --blue:        #2b5fb0;
    --blue-bright: #3d8fd6;
    --orange:      #f08a24;
    --orange-deep: #d97316;
    --bg-soft:     #f6f8fb;
    --text-soft:   #5a6479;
    --text-muted:  #8a93a6;
    --rule:        #e1e7ef;
    --rule-strong: #c9d3e0;

  Required font links in <head>:
    Open Sans, Source Sans 3 (already standard across all RRU pages)

  Notes:
    - The page's content wrapper class is `.container`. Keep that.
    - Logo path is `../Images/gsi-logo.png` (one level up from the doc).
      To save bytes, prefer this over embedded base64.
    - For each new page, customize ONLY:
        * The breadcrumb middle segment (link to module section + final crumb)
        * The <h1> title text and the <em>blue accent</em> word
    - NO eyebrow pill ("Module · 0X / X" or "Foundations · 01 / C").
      The breadcrumb already conveys location.
-->

<!-- Replace MODULE_ANCHOR, MODULE_NAME, PAGE_NAME, TITLE_PREFIX, TITLE_ACCENT -->
<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a href="rapidreconciler-university.html">University</a>
      <span class="sep">/</span>

  </div>
</section>
