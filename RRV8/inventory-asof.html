  // ============================================================
  //  Column drag-to-reorder
  // ============================================================
  let _colDragKey = null;
  function wireColumnDrag() {
    const tr = document.getElementById('details-thead-row');
    if (!tr || tr.dataset.dragWired === '1') return;
    tr.dataset.dragWired = '1';
    tr.addEventListener('dragstart', (e) => {
      const th = e.target.closest('th[data-col-key]');
      if (!th) return;
      _colDragKey = th.dataset.colKey;
      th.classList.add('is-dragging');
      try {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', _colDragKey);
      } catch (_) {}
    });
    tr.addEventListener('dragend', () => {
      tr.querySelectorAll('th').forEach(t => t.classList.remove('is-dragging', 'is-drag-over'));
      _colDragKey = null;
    });
    tr.addEventListener('dragover', (e) => {
      const th = e.target.closest('th[data-col-key]');
      if (!th || !_colDragKey) return;
      e.preventDefault();
      try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
      tr.querySelectorAll('th').forEach(t => t.classList.toggle('is-drag-over', t === th));
    });
    tr.addEventListener('dragleave', (e) => {
      const th = e.target.closest('th[data-col-key]');
      if (th && !tr.contains(e.relatedTarget)) th.classList.remove('is-drag-over');
    });
    tr.addEventListener('drop', (e) => {
      const th = e.target.closest('th[data-col-key]');
      if (!th || !_colDragKey) return;
      e.preventDefault();
      const targetKey = th.dataset.colKey;
      if (targetKey === _colDragKey) return;
      const order = _state.colOrder.slice();
      const fromIdx = order.indexOf(_colDragKey);
      if (fromIdx < 0) return;
      order.splice(fromIdx, 1);
      const toIdx = order.indexOf(targetKey);
      if (toIdx < 0) return;
      order.splice(toIdx, 0, _colDragKey);
      _state.colOrder = order;
      saveColOrder();
      renderDetails();
    });
  }
  function wireColumnSort() {
    const tr = document.getElementById('details-thead-row');
    if (!tr || tr.dataset.sortWired === '1') return;
    tr.dataset.sortWired = '1';
    tr.addEventListener('click', (e) => {
      // §9 — funnel button takes precedence over sort. The button stops
      // propagation so this handler only sees real header clicks.
      const filterBtn = e.target.closest('[data-action="filter-col"]');
      if (filterBtn) {
        e.stopPropagation();
        openColumnFilterPopover(filterBtn.dataset.colKey, filterBtn);
        return;
      }
      const th = e.target.closest('th[data-col-key]');
      if (!th) return;
      const key = th.dataset.colKey;
      if (_state.sortKey === key) {
        _state.sortDir = _state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        _state.sortKey = key;
        _state.sortDir = 'asc';
      }
      saveSort();
      renderDetails();
    });
  }

  // ============================================================
  //  §9 — Per-column funnel filter popover
  // ============================================================
  const _colFilterPop = document.getElementById('colfilter-popover');
  function openColumnFilterPopover(colKey, anchor) {
    const col = COLUMNS_BY_KEY[colKey];
    if (!col || !_colFilterPop) return;
    const values = distinctValuesForColumn(colKey);
    const active = (_state.columnFilters || {})[colKey] || null;
    function rowHtml(v) {
      const checked = !active || active.has(v);
      const label = (v === '' || v == null) ? '(blank)' : v;
      return '<label class="col-vis-row">' +
        '<input type="checkbox" data-value="' + escapeHtml(v) + '"' + (checked ? ' checked' : '') + '>' +
        '<span class="col-vis-label">' + escapeHtml(label) + '</span>' +
      '</label>';
    }
    _colFilterPop.innerHTML =
      '<div class="popover-section-label">Filter: ' + escapeHtml(col.label) + '</div>' +
      '<input type="search" class="col-filter-search" data-action="colfilter-search" ' +
        'placeholder="Search values…" autocomplete="off" spellcheck="false">' +
      '<div class="col-vis-list">' + values.map(rowHtml).join('') + '</div>' +
      '<div class="popover-section">' +
        '<div class="popover-row" data-action="select-all">Select all</div>' +
        '<div class="popover-row" data-action="select-none">Select none</div>' +
        '<div class="popover-row" data-action="clear-filter">Clear filter</div>' +
      '</div>';
    const r = anchor.getBoundingClientRect();
    _colFilterPop.style.left = Math.min(window.innerWidth - 280, r.left) + 'px';
    _colFilterPop.style.top  = (r.bottom + 6) + 'px';
    _colFilterPop.style.right = 'auto';
    _colFilterPop.style.minWidth = '240px';
    _colFilterPop.hidden = false;

    function readChecked() {
      return Array.from(_colFilterPop.querySelectorAll('input[type="checkbox"]'))
        .filter(cb => cb.checked).map(cb => cb.dataset.value);
    }
    function commit() {
      const checked = readChecked();
      const total = _colFilterPop.querySelectorAll('input[type="checkbox"]').length;
      if (!_state.columnFilters) _state.columnFilters = {};
      if (checked.length === total) delete _state.columnFilters[colKey];
      else                          _state.columnFilters[colKey] = new Set(checked);
      saveColumnFilters();
      renderDetails();
    }
    _colFilterPop.oninput = e => {
      if (e.target.dataset.action === 'colfilter-search') {
        const q = e.target.value.toLowerCase();
        _colFilterPop.querySelectorAll('.col-vis-row').forEach(row => {
          const lbl = row.querySelector('.col-vis-label').textContent.toLowerCase();
          row.style.display = (!q || lbl.indexOf(q) !== -1) ? '' : 'none';
        });
      }
    };
    _colFilterPop.onchange = e => {
      if (e.target.matches('input[type="checkbox"]')) commit();
    };
    _colFilterPop.onclick = e => {
      const action = e.target.closest('[data-action]');
      if (!action) return;
      const a = action.dataset.action;
      if (a === 'select-all') {
        _colFilterPop.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
        commit();
      } else if (a === 'select-none') {
        _colFilterPop.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        commit();
      } else if (a === 'clear-filter') {
        if (!_state.columnFilters) _state.columnFilters = {};
        delete _state.columnFilters[colKey];
        saveColumnFilters();
        _colFilterPop.hidden = true;
        renderDetails();
      }
    };
  }
  document.addEventListener('click', e => {
    if (!_colFilterPop) return;
    if (_colFilterPop.contains(e.target) || e.target.closest('[data-action="filter-col"]')) return;
    _colFilterPop.hidden = true;
  });
  function wireGridSearch() {
    const input = document.getElementById('grid-search-input');
    const clear = document.getElementById('grid-search-clear');
    if (!input) return;
    let t = null;
    function applyNow() {
      _state.gridSearch = input.value || '';
      if (clear) clear.hidden = !_state.gridSearch;
      renderDetails();
    }
    input.addEventListener('input', () => {
      if (t) clearTimeout(t);
      t = setTimeout(applyNow, 150);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && _state.gridSearch) {
        e.preventDefault();
        input.value = '';
        if (t) clearTimeout(t);
        applyNow();
      }
    });
    if (clear) {
      clear.addEventListener('click', () => {
        input.value = '';
        if (t) clearTimeout(t);
        applyNow();
        input.focus();
      });
    }
  }

  // ============================================================
  //  Excel export (V8 grid standard)
  //  Exports the analyst's current view: filters + visibility + order.
  // ============================================================
  function exportGridToExcel() {
    if (typeof XLSX === 'undefined') {
      toast('Excel library still loading — try again in a moment');
      return;
    }
    if (!_data) { toast('No data loaded yet'); return; }
    const rows = searchFilter(sortRows(filteredRows(), _state.sortKey, _state.sortDir), _state.gridSearch);
    if (!rows.length) { toast('No rows in scope — nothing to export'); return; }
    const cols = visibleColumns();
    if (!cols.length) { toast('No columns visible — turn at least one on'); return; }

    const stamp = new Date().toLocaleString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
    const banner    = ['As Of Generated ' + stamp].concat(new Array(Math.max(0, cols.length - 1)).fill(''));
    const headerRow = cols.map(c => c.label);

    // Grand Summaries row (totals over the visible money/qty columns)
    const moneyKeys = new Set(['Amount', 'AmtVar', 'CurrCost', 'CalcCost', 'Material', 'Labor', 'Overhead']);
    const qtyKeys   = new Set(['Quantity', 'QtyVar']);
    const sums = {};
    rows.forEach(r => {
      cols.forEach(c => {
        if (!(moneyKeys.has(c.key) || qtyKeys.has(c.key))) return;
        sums[c.key] = (sums[c.key] || 0) + (Number(r[c.key]) || 0);
      });
    });
    const firstNonNumIdx = cols.findIndex(c => !(moneyKeys.has(c.key) || qtyKeys.has(c.key)));
    const summary = cols.map((c, i) => {
      if (i === Math.max(0, firstNonNumIdx)) return 'Grand Summaries';
      if (moneyKeys.has(c.key) || qtyKeys.has(c.key)) {
        const v = sums[c.key] || 0;
        return Math.round(v * 1000) / 1000;
      }
      return '';
    });

    const intIdKeys = new Set(['ShortItem']);
    const dataRows = rows.map(r => cols.map(c => {
      const v = r[c.key];
      if (v === null || v === undefined) return '';
      if (moneyKeys.has(c.key) || qtyKeys.has(c.key)) {
        const n = +v;
        return isFinite(n) ? Math.round(n * 1000) / 1000 : '';
      }
      if (intIdKeys.has(c.key)) {
        const n = +v;
        if (!isFinite(n) || n === 0) return '';
        return Math.round(n);
      }
      return typeof v === 'string' ? v : v;
    }));

    const aoa   = [banner, headerRow, summary].concat(dataRows);
    const sheet = XLSX.utils.aoa_to_sheet(aoa);
    sheet['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: Math.max(0, cols.length - 1) } }];
    sheet['!rows'] = [{ hpt: 22 }, { hpt: 20 }];
    const moneyFmt = '$#,##0.00;[Red]($#,##0.00);-';
    const qtyFmt   = '#,##0.00;[Red](#,##0.00);-';
    cols.forEach((c, i) => {
      const isMoney = moneyKeys.has(c.key);
      const isQty   = qtyKeys.has(c.key);
      if (!isMoney && !isQty) return;
      const fmt = isMoney ? moneyFmt : qtyFmt;
      for (let r = 2; r < aoa.length; r++) {
        const ref = XLSX.utils.encode_cell({ r, c: i });
        if (sheet[ref] && typeof sheet[ref].v === 'number') sheet[ref].z = fmt;
      }
    });
    sheet['!cols'] = cols.map(c => ({ wch: Math.min(28, Math.max(10, (c.label || '').length + 4)) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, sheet, 'As Of');
    const period = (_data && _data._meta && _data._meta.period) || 'period';
    const fnStamp = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 13);
    const fname = 'AsOf_' + period + '_' + fnStamp + '.xlsx';
    XLSX.writeFile(wb, fname);
    toast('Downloaded ' + fname);
  }
  const exportBtn = document.getElementById('grid-export-btn');
  if (exportBtn) exportBtn.addEventListener('click', exportGridToExcel);

  // ============================================================
  //  Period bars (shared module)
  //  Source the OOB-per-period history from reconciliation.json
  //  (same pattern Transactions uses) so the analyst can hop
  //  periods from this page once the As Of endpoint is wired
  //  per-period server-side.
  // ============================================================
  let _periodBars = null;
  async function mountPeriodBarsForAsOf() {
    if (!window.RRV8 || !window.RRV8.mountPeriodBars) return;
    const host = document.getElementById('js-period-bars');
    if (!host) return;
    let history = [];
    try {
      const recon = await fetch('data/reconciliation.json', { cache: 'force-cache' })
        .then(r => r.ok ? r.json() : null);
      const rows = (recon && recon.accountRows) || [];
      const byPeriod = new Map();
      rows.forEach(r => {
        byPeriod.set(r.period, (byPeriod.get(r.period) || 0) + (r.outOfBalance || 0));
      });
      history = Array.from(byPeriod.entries())
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([period, value]) => ({ period, value: Math.round(value * 100) / 100 }));
    } catch (_) {}
    const cur = (_data && _data._meta && _data._meta.period) ||
                (history.length ? history[history.length - 1].period : null);
    _periodBars = window.RRV8.mountPeriodBars({
      host,
      data: history,
      currentPeriod: cur,
      labelFor: (p) => formatPeriod(p),
      fmtValue: (v) => fmtMoney(v),
      labelText: 'Out of Bal by Period',
      onSwitch: (p) => {
        if (!p) return;
        // Only one period of As Of data is captured in demo mode.
        // Surface that explicitly when the user clicks a different bar.
        if (_data && _data._meta && p === _data._meta.period) return;
        toast('Period ' + formatPeriod(p) + ' not in the captured snapshot — only ' +
              formatPeriod((_data && _data._meta && _data._meta.period) || '') + ' available in demo mode');
        if (_periodBars) _periodBars.setCurrentPeriod((_data && _data._meta && _data._meta.period) || p);
      }
    });
  }
  setTimeout(mountPeriodBarsForAsOf, 0);

  // ============================================================
  //  Sidebar nav — carry URL query forward, suppress '#' clicks
  // ============================================================
  const search = window.location.search;
  if (search) {
    document.querySelectorAll('a[data-nav-page]').forEach(a => {
      const base = a.getAttribute('href') || '';
      if (base && !base.includes('?') && base !== '#') a.setAttribute('href', base + search);
    });
  }
  document.querySelectorAll('.sidebar-nav-item, .sidebar-nav-child').forEach(a => {
    a.addEventListener('click', (e) => {
      if (a.classList.contains('is-active')) { e.preventDefault(); return; }
      const href = a.getAttribute('href') || '';
      if (!href || href === '#') { e.preventDefault(); }
    });
  });

  // ============================================================
  //  Boot
  // ============================================================
  renderTableHeader();
  updateColPill();
  updateCompanyPill();
  updateUomPill();
  updateLotDetailPill();
  wireColumnDrag();
  wireColumnSort();
  wireGridSearch();
  loadData();

})();
