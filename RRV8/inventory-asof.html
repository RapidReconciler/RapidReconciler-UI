<!DOCTYPE html>
<!--
  =============================================================================
  MOCKUP: Inventory > As Of
  =============================================================================
  V8 reimagining of the legacy AngularJS As-Of page. Renders the per-item
  perpetual snapshot for the active period from `data/as-of.json`, with:

    - Hero stats strip (Quantity / Amount / QtyVar / AmtVar), filter-aware.
    - Page-action controls: Common UOM dropdown (narrows rows to a UOM),
      Summarize by Item toggle (groups by item across lots), Re-roll button
      (server-side rebuild — placeholder).
    - V8 grid with the standard chrome from GRID-STANDARDS.md
      (drag-to-reorder, click-sort, search, Excel export, column chooser).
      ~10 default columns; ~40 togglable in the chooser.

  Demo mode reads the snapshot at `data/as-of.json` (4,703 rows, company
  00050 only — derived from the legacy export). Prod-mode wiring against
  `/inventory/as-of` is queued; the controller exists in the jar
  (AsOfController) but isn't yet wired in V8.
  =============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory As Of &mdash; RapidReconciler Mockup</title>
<link href="fonts/fonts.css" rel="stylesheet">
<link href="sidebar.css" rel="stylesheet">
<link href="period-bars.css" rel="stylesheet">
<script src="config.js"></script>
<script src="sidebar.js"></script>
<script src="period-bars.js"></script>
<script src="vendor/xlsx.full.min.js" defer></script>
<style>
  :root {
    --navy:        #1f2d4a;
    --navy-deep:   #142037;
    --blue:        #2b5fb0;
    --blue-bright: #3d8fd6;
    --blue-pale:   #e6efff;
    --orange:      #f08a24;
    --orange-deep: #d97316;
    --orange-pale: #fbe7ce;
    --green:       #2e8a55;
    --green-pale:  #def4e6;
    --red:         #c0392b;
    --red-pale:    #fce5e1;
    --bg:          #fafbfd;
    --bg-soft:     #f3f5f9;
    --bg-card:     #ffffff;
    --text:        #1f2d4a;
    --text-soft:   #4a5468;
    --text-muted:  #828a9a;
    --rule:        #e6eaf0;
    --rule-strong: #cfd6e0;
    --shadow-sm:   0 1px 2px rgba(20, 32, 55, 0.04);
    --shadow-md:   0 4px 12px -2px rgba(20, 32, 55, 0.08);
    --shadow-lg:   0 14px 32px -10px rgba(20, 32, 55, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Open Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4 { font-family: 'Source Sans 3', sans-serif; font-weight: 700; }
  a { color: inherit; text-decoration: none; }

  /* ============================================================
     APP SHELL — V8 standard (matches Transactions / Reconciliation).
     ============================================================ */
  .app {
    display: grid;
    grid-template-columns: 60px 1fr;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "sidebar topbar"
      "sidebar main";
    min-height: 100vh;
  }
  .topbar {
    grid-area: topbar;
    background: var(--bg-card);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    padding: 0 24px;
    z-index: 50;
    box-shadow: var(--shadow-sm);
    gap: 14px;
  }
  .topbar-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .topbar-brand-logo {
    height: 28px;
    width: auto;
    flex-shrink: 0;
    display: block;
  }
  .topbar-brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
    min-width: 0;
  }
  .topbar-brand-name {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--navy);
    letter-spacing: -0.005em;
  }
  .topbar-brand-db {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  body.has-pinned-sidebar .app { grid-template-columns: 240px 1fr; }

  .main { grid-area: main; overflow-y: auto; }
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 28px 64px;
  }

  /* ============================================================
     PAGE HEADER (V8 standard)
     ============================================================ */
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 22px;
  }
  .page-header-left { min-width: 0; }
  .breadcrumb {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--blue); }
  .breadcrumb-sep { margin: 0 8px; opacity: 0.5; }
  .page-title {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 800;
    font-size: 30px;
    color: var(--navy);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .page-title-link {
    color: inherit;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .page-title-link:hover { color: var(--blue); }
  .page-title-ext-icon { width: 18px; height: 18px; opacity: 0.45; }
  .page-title-link:hover .page-title-ext-icon { opacity: 0.85; }

  /* ============================================================
     PAGE ACTIONS — Common UOM dropdown / Summarize by Item /
     Re-roll. Sits in its own row under the page header.
     ============================================================ */
  .page-actions-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .action-control {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--rule-strong);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    color: var(--text);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    user-select: none;
  }
  .action-control:hover { border-color: var(--blue); color: var(--blue); }
  .action-control svg { width: 13px; height: 13px; flex-shrink: 0; }
  .action-control.is-active {
    background: var(--blue-pale);
    border-color: var(--blue);
    color: var(--blue);
  }
  .action-control-label {
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .action-control.is-active .action-control-label { color: var(--blue); }
  .action-control-value {
    font-weight: 800;
    font-size: 12.5px;
    color: var(--navy);
  }
  .action-control.is-active .action-control-value { color: var(--blue); }
  .action-toggle .toggle-pip {
    width: 28px;
    height: 16px;
    border-radius: 100px;
    background: var(--rule-strong);
    position: relative;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .action-toggle .toggle-pip::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    transition: left 0.15s;
  }
  .action-toggle.is-active .toggle-pip { background: var(--blue); }
  .action-toggle.is-active .toggle-pip::after { left: 14px; }
  .action-button {
    background: var(--orange);
    color: #fff;
    border-color: var(--orange);
  }
  .action-button:hover {
    background: var(--orange-deep);
    border-color: var(--orange-deep);
    color: #fff;
  }
  .action-spacer { flex: 1 1 auto; }
  .filter-banner {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--blue-pale);
    color: var(--blue);
    border-radius: 100px;
    padding: 5px 14px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: 12px;
  }
  .filter-banner[hidden] { display: none; }
  .filter-banner .filter-banner-clear {
    background: transparent;
    border: 0;
    color: inherit;
    cursor: pointer;
    font-weight: 800;
    padding: 0 0 0 4px;
  }
  .filter-banner .filter-banner-clear:hover { text-decoration: underline; }


  /* Row-expand affordance — only rendered when the grid is in
     item-rollup mode AND a row has more than one underlying lot. */
  .details-table td.col-expand {
    width: 28px;
    padding-left: 14px;
    padding-right: 0;
  }
  .details-table th.col-expand {
    width: 28px;
    padding-left: 14px;
    padding-right: 0;
  }
  .expand-btn {
    background: transparent;
    border: 0;
    cursor: pointer;
    width: 16px; height: 16px;
    padding: 0;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: transform 0.15s, color 0.12s;
  }
  .expand-btn svg { width: 10px; height: 10px; }
  .expand-btn:hover { color: var(--blue); background: var(--blue-pale); }
  .expand-btn.is-expanded { transform: rotate(90deg); color: var(--blue); }
  .expand-btn.is-disabled {
    cursor: default;
    color: var(--rule);
  }
  .expand-btn.is-disabled:hover { background: transparent; color: var(--rule); }
  .lot-detail-row td {
    background: var(--bg-soft);
    padding: 0 !important;
    border-bottom: 1px solid var(--rule);
  }
  .lot-detail-wrap {
    padding: 8px 14px 12px 42px;
    font-family: 'Open Sans', sans-serif;
  }
  .lot-detail-header {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .lot-detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .lot-detail-table th,
  .lot-detail-table td {
    text-align: left;
    padding: 4px 8px;
    border-bottom: 1px dashed var(--rule);
    white-space: nowrap;
  }
  .lot-detail-table th {
    color: var(--text-muted);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .lot-detail-table td.is-num,
  .lot-detail-table th.is-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .lot-detail-empty {
    color: var(--text-muted);
    font-style: italic;
    font-size: 11.5px;
    padding: 4px 0;
  }

  /* ============================================================
     HERO STATS STRIP — 4 KPI tiles, filter-aware.
     ============================================================ */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-tile {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 16px 18px 18px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-tile-label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .stat-tile-value {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    font-variant-numeric: tabular-nums;
    line-height: 1.15;
  }
  .stat-tile-value.is-neg { color: var(--red); }
  .stat-tile-sub {
    font-size: 11.5px;
    color: var(--text-muted);
  }

  /* ============================================================
     DETAILS CARD + V8 GRID
     ============================================================ */
  .details-card {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .details-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px 12px;
    border-bottom: 1px solid var(--rule);
    gap: 16px;
  }
  .details-title {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--navy);
  }
  .details-head-right { display: flex; align-items: center; gap: 10px; }

  /* GRID STANDARDS — .grid-pill, .grid-state-cluster, .grid-search */
  .grid-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    padding: 5px 10px;
    border-radius: 100px;
    border: 1px solid var(--rule-strong);
    background: var(--bg-card);
    color: var(--text-soft);
    cursor: default;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  button.grid-pill { cursor: pointer; }
  button.grid-pill:hover { background: var(--bg-soft); color: var(--text); }
  button.grid-pill.is-narrowed {
    background: rgba(241, 164, 67, 0.12);
    color: #8a5a14;
    border-color: rgba(241, 164, 67, 0.40);
  }
  .grid-pill svg { width: 12px; height: 12px; flex-shrink: 0; }
  .grid-pill .pill-caret { opacity: 0.55; }
  .grid-pill.is-loading { color: var(--text-muted); font-style: italic; }
  .grid-state-cluster {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .grid-search {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px 4px 10px;
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 100px;
  }
  .grid-search:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(43, 95, 176, 0.18);
  }
  .grid-search svg {
    width: 13px; height: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .grid-search input {
    border: 0;
    outline: none;
    background: transparent;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12.5px;
    color: var(--text);
    width: 160px;
    padding: 0;
  }
  .grid-search input::placeholder { color: var(--text-muted); }
  .grid-search input::-webkit-search-decoration,
  .grid-search input::-webkit-search-cancel-button { -webkit-appearance: none; }
  .grid-search-clear {
    background: transparent;
    border: 0;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .grid-search-clear:hover { color: var(--text); }

  .details-scroll {
    max-height: 600px;
    overflow: auto;
  }
  .details-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
  }
  .details-table thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--bg-soft);
    color: var(--text-muted);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule);
    white-space: nowrap;
  }
  .details-table th.is-num { text-align: right; }
  .details-table thead th[draggable="true"] { cursor: grab; user-select: none; }
  .details-table thead th[draggable="true"]:active { cursor: grabbing; }
  .details-table thead th.is-dragging { opacity: 0.35; }
  .details-table thead th.is-drag-over {
    box-shadow: inset 3px 0 0 var(--blue);
    background: rgba(43, 95, 176, 0.08);
  }
  .details-table thead th[data-col-key]:hover { color: var(--blue); }
  .details-table thead th.is-sort-active { color: var(--blue); }
  /* §9 — Per-column funnel filter trigger (Excel-style picker). */
  .col-filter-trigger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    margin-left: 4px;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
    color: var(--text-muted);
    opacity: 0.45;
    vertical-align: middle;
    transition: opacity 0.12s, color 0.12s;
  }
  .details-table thead th:hover .col-filter-trigger { opacity: 0.9; }
  .col-filter-trigger:hover { color: var(--blue); opacity: 1; }
  .col-filter-trigger svg { width: 11px; height: 11px; display: block; }
  .details-table thead th.is-filter-active { color: var(--blue); }
  .details-table thead th.is-filter-active .col-filter-trigger {
    color: var(--blue);
    opacity: 1;
  }
  .col-filter-search {
    display: block;
    width: calc(100% - 24px);
    margin: 4px 12px 6px;
    padding: 5px 8px;
    border: 1px solid var(--rule-strong);
    border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12.5px;
    outline: none;
  }
  .col-filter-search:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(43, 95, 176, 0.18);
  }
  .details-table thead th .sort-caret {
    display: inline-block;
    margin-left: 4px;
    font-size: 9px;
    line-height: 1;
    color: var(--blue);
    vertical-align: middle;
  }
  .details-table tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--rule);
    color: var(--text);
    white-space: nowrap;
    vertical-align: middle;
  }
  .details-table tbody tr:hover td { background: rgba(43, 95, 176, 0.04); }
  .details-table td.is-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .details-table td.is-money {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .details-table td .neg { color: var(--red); }
  .details-empty {
    padding: 32px 22px;
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
  }
  .details-skeleton {
    padding: 32px 22px;
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Column-chooser popover (matches Transactions) */
  .popover {
    position: fixed;
    background: var(--bg-card);
    border: 1px solid var(--rule-strong);
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    padding: 8px;
    min-width: 220px;
    max-height: 70vh;
    overflow: auto;
  }
  .popover[hidden] { display: none; }
  .popover-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text);
    cursor: pointer;
  }
  .popover-row:hover { background: var(--bg-soft); }
  .popover-section-label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 12px 4px;
  }
  .col-vis-list {
    margin-top: 4px;
    border-top: 1px solid var(--rule);
    padding-top: 4px;
    max-height: 360px;
    overflow: auto;
  }
  .col-vis-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  .col-vis-row:hover { background: var(--bg-soft); }
  .col-vis-row input[type="checkbox"] {
    width: 14px; height: 14px;
    accent-color: var(--blue);
    cursor: pointer;
  }
  .col-vis-row .col-vis-label { flex: 1; }
  .col-vis-row.is-muted .col-vis-label { color: var(--text-muted); }

  /* UOM dropdown popover */
  .uom-list {
    max-height: 360px;
    overflow: auto;
  }
  .uom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .uom-row:hover { background: var(--bg-soft); }
  .uom-row.is-selected { background: var(--blue-pale); color: var(--blue); font-weight: 700; }
  .uom-row .uom-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* Fetch-error banner (carried forward from the V8 standard) */
  .fetch-error-banner {
    display: flex;
    gap: 12px;
    background: var(--red-pale);
    color: var(--red);
    border: 1px solid rgba(192,57,43,0.30);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 18px;
  }
  .feb-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    font-weight: 800;
    display: grid; place-items: center;

<script>
(function () {
  'use strict';

  // ============================================================
  //  Sidebar mount (shared chrome)
  // ============================================================
  if (window.RRV8 && typeof window.RRV8.mountSidebar === 'function') {
    window.RRV8.mountSidebar({ activePage: 'asof', hasPeriodFilter: true });
  }
  // Reflect cross-page state in the sidebar (filter counts + status
  // dots + last-selected period) — the As Of page doesn't wire the
  // full filter popovers but the analyst should see the state they
  // already set on Reconciliation/Transactions.
  if (window.RRV8 && typeof window.RRV8.paintSidebarFromCache === 'function') {
    window.RRV8.paintSidebarFromCache();
  }

  // ============================================================
  //  MODE + SESSION (same conventions as the other V8 pages)
  // ============================================================
  const RR_CONFIG = window.RR_CONFIG || { mode: 'demo', dataPath: 'data/' };
  const MODE = (function () {
    try {
      const u = new URL(window.location.href);
      const q = (u.searchParams.get('mode') || '').toLowerCase();
      if (q === 'demo' || q === 'staging' || q === 'prod') return q;
    } catch (_) {}
    return RR_CONFIG.mode || 'demo';
  })();
  const IS_DEMO = MODE === 'demo';

  // ============================================================
  //  SESSION + rrFetch — agent-first per the V8 tenet.
  //  Demo mode reads the static JSON snapshots under data/.
  //  Staging/prod mode hits the live RR data-services agent.
  // ============================================================
  window.RR_SESSION = window.RR_SESSION || { user: null, dbs: [], activeDbIndex: 0, token: null };
  function rrParseJwt(token) {
    try {
      const part = String(token).split('.')[1];
      if (!part) return null;
      const b64 = part.replace(/-/g, '+').replace(/_/g, '/');
      const pad = b64.length % 4;
      const padded = pad ? b64 + '='.repeat(4 - pad) : b64;
      const json = decodeURIComponent(atob(padded).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      return JSON.parse(json);
    } catch (_) { return null; }
  }
  function hydrateSessionFromToken() {
    try {
      const token = localStorage.getItem('rrv8.token');
      if (!token) return false;
      const payload = rrParseJwt(token);
      if (!payload) return false;
      window.RR_SESSION.token = token;
      window.RR_SESSION.user  = payload.user || null;
      window.RR_SESSION.dbs   = Array.isArray(payload.dbs) ? payload.dbs : [];
      // Pick the first DB by default; user-menu DB switcher (when wired)
      // can override.
      if (window.RR_SESSION.activeDbIndex >= window.RR_SESSION.dbs.length) {
        window.RR_SESSION.activeDbIndex = 0;
      }
      return window.RR_SESSION.dbs.length > 0;
    } catch (_) { return false; }
  }
  if (!IS_DEMO) hydrateSessionFromToken();
  function prodHeaders(contentType) {
    const h = { 'Accept': 'application/json' };
    if (window.RR_SESSION.token) h['Authorization'] = 'Bearer ' + window.RR_SESSION.token;
    if (contentType) h['Content-Type'] = contentType;
    return h;
  }
  function rrFetch(area, opts) {
    opts = opts || {};
    if (IS_DEMO) {
      const file = (opts.demoFile || area) + '.json';
      return fetch((RR_CONFIG.dataPath || 'data/') + file, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + file); return r.json(); });
    }
    const db = window.RR_SESSION.dbs[window.RR_SESSION.activeDbIndex];
    if (!db || !db.ip) {
      return Promise.reject(new Error('No active database in session — sign in via the hub first.'));
    }
    const url = 'https://' + db.ip + '/' + area;
    return fetch(url, {
      method:  opts.method || 'GET',
      headers: prodHeaders(opts.body ? 'application/json;charset=UTF-8' : null),
      body:    opts.body ? JSON.stringify(opts.body) : undefined
    }).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + url);
      return r.text().then(t => t ? JSON.parse(t) : null);
    });
  }
  function reconciliationFilterFromSession() {
    // The /inventory/as-of and /inventory/integrity endpoints expect
    // bare string arrays here (NOT the {id, checked, show} Item shape
    // that /inventory/reconciliation-filtered requires).
    const db = window.RR_SESSION.dbs[window.RR_SESSION.activeDbIndex] || {};
    return {
      companies:     Array.isArray(db.i) ? db.i : [],
      businessUnits: [],
      objects:       [],
      subsidiaries:  [],
      currencies:    []
    };
  }
  // Normalize agent response keys (camelCase first-letter-lowercase)
  // to the TitleCase shape my COLUMNS expect. Snapshot rows are
  // already TitleCase so pass through. Handles known acronyms
  // (UOM, GLClass, etc.) explicitly; the rest get a simple first-
  // letter uppercase.
  const _AGENT_KEY_OVERRIDES = {
    uom: 'UOM', glClass: 'GLClass', qtyVar: 'QtyVar', amtVar: 'AmtVar',
    st: 'ST', cm: 'CM', lotBod: 'LotBod', lotExp: 'LotExp',
    lotStatus: 'LotStatus', currCost: 'CurrCost', calcCost: 'CalcCost'
  };
  function normalizeAsOfRows(rows) {
    if (!Array.isArray(rows) || !rows.length) return rows || [];
    const first = rows[0];
    // Snapshot shape detected by TitleCase keys
    if ('CompanyNumber' in first || 'LongAccount' in first) return rows;
    return rows.map(r => {
      const out = {};
      Object.keys(r).forEach(k => {
        const nk = _AGENT_KEY_OVERRIDES[k] || (k[0].toUpperCase() + k.slice(1));
        out[nk] = r[k];
      });
      return out;
    });
  }

  // ============================================================
  //  TOAST
  // ============================================================
  const toastEl = document.getElementById('js-toast');
  let toastTimer = null;
  function toast(msg) {
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.classList.add('is-visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('is-visible'), 2400);
  }

  // ============================================================
  //  Util
  // ============================================================
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, m =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])
    );
  }
  function fmtInt(n) {
    const x = Number(n);
    if (!isFinite(x)) return '';
    return Math.round(x).toLocaleString('en-US');
  }
  function fmtQty(n) {
    const x = Number(n);
    if (!isFinite(x)) return '';
    return x.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }
  function fmtMoney(n) {
    const x = Number(n);
    if (!isFinite(x)) return '';
    const abs = Math.abs(x).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return x < 0 ? '(' + abs + ')' : abs;
  }
  function moneyCell(n) {
    const x = Number(n);
    if (!isFinite(x) || x === 0) return '<span style="color:var(--text-muted)">&mdash;</span>';
    const cls = x < 0 ? 'neg' : '';
    const txt = fmtMoney(x);
    return cls ? '<span class="' + cls + '">' + txt + '</span>' : txt;
  }
  function qtyCell(n) {
    const x = Number(n);
    if (!isFinite(x) || x === 0) return '<span style="color:var(--text-muted)">&mdash;</span>';
    const cls = x < 0 ? 'neg' : '';
    const txt = fmtQty(x);
    return cls ? '<span class="' + cls + '">' + txt + '</span>' : txt;
  }
  // "outside operations" and "gl class not in base table" are dummy
  // longAccount values in the upstream views — not real inventory
  // accounts. They shouldn't appear in any grid or contribute to
  // totals; the Reconciliation page already filters them via the
  // accountRows intersection. Apply the same rule here.
  function isExcludedAccount(longAccount) {
    const s = String(longAccount || '').toLowerCase();
    return s.indexOf('outside operations') !== -1
        || s.indexOf('not in base table') !== -1;
  }

  function formatPeriod(iso) {
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso || ''));
    if (!m) return iso;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(m[2],10)-1] + ' ' + parseInt(m[3],10) + ', ' + m[1];
  }

  // ============================================================
  //  COLUMNS
  //  ~10 default; the rest togglable via the column chooser.
  //  Order = legacy export column order so the analyst's muscle
  //  memory holds.
  // ============================================================
  const COLUMNS = [
    { key:'CompanyNumber', label:'Company',     defaultOn:true,  render: r => escapeHtml(r.CompanyNumber || '') },
    { key:'BranchCompany', label:'Branch Co',   defaultOn:false, render: r => escapeHtml(r.BranchCompany || '') },
    { key:'LongAccount',   label:'Account',     defaultOn:true,  render: r => escapeHtml(r.LongAccount || '') },
    { key:'Currency',      label:'Currency',    defaultOn:true,  render: r => escapeHtml(r.Currency || '') },
    { key:'Branch',        label:'Branch',      defaultOn:true,  render: r => escapeHtml(r.Branch || '') },
    { key:'BranchDesc',    label:'Branch Desc', defaultOn:false, render: r => escapeHtml(r.BranchDesc || '') },
    { key:'ShortItem',     label:'Short Item',  defaultOn:false, numHeader:true, tdClass:'is-num', render: r => escapeHtml(fmtInt(r.ShortItem)) },
    { key:'ItemNumber',    label:'Item',        defaultOn:true,  render: r => escapeHtml(r.ItemNumber || '') },
    { key:'ThirdItem',     label:'Third Item',  defaultOn:false, render: r => escapeHtml(r.ThirdItem || '') },
    { key:'Description',   label:'Description', defaultOn:true,  render: r => escapeHtml(r.Description || '') },
    { key:'UOM',           label:'UOM',         defaultOn:true,  render: r => escapeHtml(r.UOM || '') },
    { key:'Quantity',      label:'Quantity',    defaultOn:true,  numHeader:true, tdClass:'is-num',   render: r => qtyCell(r.Quantity) },
    { key:'Amount',        label:'Amount',      defaultOn:true,  numHeader:true, tdClass:'is-money', render: r => moneyCell(r.Amount) },
    { key:'GLClass',       label:'GL Class',    defaultOn:true,  render: r => escapeHtml(r.GLClass || '') },
    { key:'CurrCost',      label:'Curr Cost',   defaultOn:false, numHeader:true, tdClass:'is-money', render: r => moneyCell(r.CurrCost) },
    { key:'CalcCost',      label:'Calc Cost',   defaultOn:false, numHeader:true, tdClass:'is-money', render: r => moneyCell(r.CalcCost) },
    { key:'Location',      label:'Location',    defaultOn:false, render: r => escapeHtml(r.Location || '') },
    { key:'Lot',           label:'Lot',         defaultOn:false, render: r => escapeHtml(r.Lot || '') },
    { key:'LotStatus',     label:'Lot Status',  defaultOn:false, render: r => escapeHtml(r.LotStatus || '') },
    { key:'LotExp',        label:'Lot Exp',     defaultOn:false, render: r => escapeHtml(r.LotExp || '') },
    { key:'LotBod',        label:'Lot Bod',     defaultOn:false, render: r => escapeHtml(r.LotBod || '') },
    { key:'ST',            label:'ST',          defaultOn:false, render: r => escapeHtml(r.ST || '') },
    { key:'CM',            label:'CM',          defaultOn:false, render: r => escapeHtml(r.CM || '') },
    { key:'Material',      label:'Material',    defaultOn:false, numHeader:true, tdClass:'is-money', render: r => moneyCell(r.Material) },
    { key:'Labor',         label:'Labor',       defaultOn:false, numHeader:true, tdClass:'is-money', render: r => moneyCell(r.Labor) },
    { key:'Overhead',      label:'Overhead',    defaultOn:false, numHeader:true, tdClass:'is-money', render: r => moneyCell(r.Overhead) },
    { key:'QtyVar',        label:'Qty Var',     defaultOn:false, numHeader:true, tdClass:'is-num',   render: r => qtyCell(r.QtyVar) },
    { key:'AmtVar',        label:'Amt Var',     defaultOn:false, numHeader:true, tdClass:'is-money', render: r => moneyCell(r.AmtVar) },
    { key:'Sales01',       label:'Sales01',     defaultOn:false, render: r => escapeHtml(r.Sales01 || '') },
    { key:'Sales02',       label:'Sales02',     defaultOn:false, render: r => escapeHtml(r.Sales02 || '') },
    { key:'Sales03',       label:'Sales03',     defaultOn:false, render: r => escapeHtml(r.Sales03 || '') },
    { key:'Sales04',       label:'Sales04',     defaultOn:false, render: r => escapeHtml(r.Sales04 || '') },
    { key:'Sales05',       label:'Sales05',     defaultOn:false, render: r => escapeHtml(r.Sales05 || '') },
    { key:'Sales06',       label:'Sales06',     defaultOn:false, render: r => escapeHtml(r.Sales06 || '') },
    { key:'Sales07',       label:'Sales07',     defaultOn:false, render: r => escapeHtml(r.Sales07 || '') },
    { key:'Sales08',       label:'Sales08',     defaultOn:false, render: r => escapeHtml(r.Sales08 || '') },
    { key:'Sales09',       label:'Sales09',     defaultOn:false, render: r => escapeHtml(r.Sales09 || '') },
    { key:'Sales10',       label:'Sales10',     defaultOn:false, render: r => escapeHtml(r.Sales10 || '') },
    { key:'Purch01',       label:'Purch01',     defaultOn:false, render: r => escapeHtml(r.Purch01 || '') },
    { key:'Purch02',       label:'Purch02',     defaultOn:false, render: r => escapeHtml(r.Purch02 || '') },
    { key:'Purch03',       label:'Purch03',     defaultOn:false, render: r => escapeHtml(r.Purch03 || '') },
    { key:'Purch04',       label:'Purch04',     defaultOn:false, render: r => escapeHtml(r.Purch04 || '') },
    { key:'Purch05',       label:'Purch05',     defaultOn:false, render: r => escapeHtml(r.Purch05 || '') },
    { key:'Purch06',       label:'Purch06',     defaultOn:false, render: r => escapeHtml(r.Purch06 || '') },
    { key:'Purch07',       label:'Purch07',     defaultOn:false, render: r => escapeHtml(r.Purch07 || '') },
    { key:'Purch08',       label:'Purch08',     defaultOn:false, render: r => escapeHtml(r.Purch08 || '') },
    { key:'Purch09',       label:'Purch09',     defaultOn:false, render: r => escapeHtml(r.Purch09 || '') },
    { key:'Purch10',       label:'Purch10',     defaultOn:false, render: r => escapeHtml(r.Purch10 || '') }
  ];
  const COLUMNS_BY_KEY = {};
  COLUMNS.forEach(c => { COLUMNS_BY_KEY[c.key] = c; });

  // ============================================================
  //  STATE + persistence
  // ============================================================
  const COL_LS_KEY       = 'rrv8-asof-columns-v1';
  const COL_ORDER_LS_KEY = 'rrv8-asof-col-order-v1';
  const SORT_LS_KEY      = 'rrv8-asof-sort-v1';
  const UOM_LS_KEY       = 'rrv8-asof-uom-v1';
  const COMPANY_LS_KEY   = 'rrv8-asof-company-v1';
  const SUMMARIZE_LS_KEY = 'rrv8-asof-summarize-v1';
  const COLFILTER_LS_KEY = 'rrv8-asof-colfilter-v1';

  function loadColVisibility() {
    const out = {};
    COLUMNS.forEach(c => { out[c.key] = c.defaultOn; });
    try {
      const raw = localStorage.getItem(COL_LS_KEY);
      if (raw) {
        const saved = JSON.parse(raw) || {};
        Object.keys(saved).forEach(k => { if (k in out) out[k] = !!saved[k]; });
      }
    } catch (_) {}
    return out;
  }
  function saveColVisibility() {
    try { localStorage.setItem(COL_LS_KEY, JSON.stringify(_state.colVisibility)); } catch (_) {}
  }
  function loadColOrder() {
    const allKeys = COLUMNS.map(c => c.key);
    const knownSet = new Set(allKeys);
    try {
      const raw = localStorage.getItem(COL_ORDER_LS_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        if (Array.isArray(saved)) {
          const filtered = saved.filter(k => knownSet.has(k));
          const present  = new Set(filtered);
          const missing  = allKeys.filter(k => !present.has(k));
          return filtered.concat(missing);
        }
      }
    } catch (_) {}
    return allKeys;
  }
  function saveColOrder() {
    try { localStorage.setItem(COL_ORDER_LS_KEY, JSON.stringify(_state.colOrder)); } catch (_) {}
  }
  function loadSort() {
    try {
      const raw = localStorage.getItem(SORT_LS_KEY);
      if (!raw) return { key: null, dir: 'asc' };
      const s = JSON.parse(raw);
      if (s && (s.key === null || typeof s.key === 'string') && (s.dir === 'asc' || s.dir === 'desc')) return s;
    } catch (_) {}
    return { key: null, dir: 'asc' };
  }
  function saveSort() {
    try { localStorage.setItem(SORT_LS_KEY, JSON.stringify({ key: _state.sortKey, dir: _state.sortDir })); } catch (_) {}
  }
  function loadUom() {
    try { return localStorage.getItem(UOM_LS_KEY) || ''; } catch (_) { return ''; }
  }
  function saveUom() {
    try {
      if (_state.uomFilter) localStorage.setItem(UOM_LS_KEY, _state.uomFilter);
      else localStorage.removeItem(UOM_LS_KEY);
    } catch (_) {}
  }
  function loadCompany() {
    try { return localStorage.getItem(COMPANY_LS_KEY) || ''; } catch (_) { return ''; }
  }
  function saveCompany() {
    try {
      if (_state.companyFilter) localStorage.setItem(COMPANY_LS_KEY, _state.companyFilter);
      else localStorage.removeItem(COMPANY_LS_KEY);
    } catch (_) {}
  }
  function loadColumnFilters() {
    const out = {};
    try {
      const raw = localStorage.getItem(COLFILTER_LS_KEY);
      if (!raw) return out;
      const saved = JSON.parse(raw) || {};
      Object.keys(saved).forEach(k => {
        if (COLUMNS_BY_KEY[k] && Array.isArray(saved[k]) && saved[k].length) {
          out[k] = new Set(saved[k]);
        }
      });
    } catch (_) {}
    return out;
  }
  function saveColumnFilters() {
    try {
      const obj = {};
      Object.keys(_state.columnFilters || {}).forEach(k => {
        const s = _state.columnFilters[k];
        if (s && s.size) obj[k] = Array.from(s);
      });
      localStorage.setItem(COLFILTER_LS_KEY, JSON.stringify(obj));
    } catch (_) {}
  }
  function loadSummarize() {
    // Default ON: the analyst's normal mental model is "where does
    // this item stand?" not "show me lot 47 of item X." Lot detail
    // is the drill-in via the row-expand affordance OR the explicit
    // "Lot detail" toggle.
    try {
      const raw = localStorage.getItem(SUMMARIZE_LS_KEY);
      if (raw === null) return true;
      return raw !== '0';
    } catch (_) { return true; }
  }
  function saveSummarize() {
    try { localStorage.setItem(SUMMARIZE_LS_KEY, _state.summarize ? '1' : '0'); } catch (_) {}
  }

  const _state = {
    colVisibility: loadColVisibility(),
    colOrder:      loadColOrder(),
    sortKey:       null,
    sortDir:       'asc',
    gridSearch:    '',
    companyFilter: loadCompany(),
    uomFilter:     loadUom(),
    summarize:     loadSummarize(),
    expanded:      new Set(),  // keys of rolled-up rows the user has expanded
    columnFilters: loadColumnFilters()
  };
  const _savedSort = loadSort();
  _state.sortKey = _savedSort.key;
  _state.sortDir = _savedSort.dir;

  let _data   = null;        // {_meta, totals, rows}
  let _viewRows = null;      // cached filtered+summarized rows for the active view

  function visibleColumns() {
    return _state.colOrder
      .map(k => COLUMNS_BY_KEY[k])
      .filter(c => c && _state.colVisibility[c.key]);
  }
  function visibleColspan() {
    // +1 for the expand column when the grid is in rollup mode.
    return Math.max(1, visibleColumns().length + (_state.summarize ? 1 : 0));
  }

  // ============================================================
  //  Data load
  // ============================================================
  async function loadData() {
    const skeleton = document.getElementById('details-skeleton-cell');
    if (skeleton) skeleton.colSpan = visibleColspan();
    try {
      // Source the period from the cross-page cache (set by Recon /
      // Transactions period bar) or the snapshot's _meta.period
      // fallback. The agent's request DTO names this field `daily`
      // (NOT `period` — Jackson drops unknown keys silently).
      const period = readCurrentPeriodFromCache() || (_data && _data._meta && _data._meta.period) || null;
      const payload = await rrFetch('inventory/as-of', {
        method: 'POST',
        body: {
          reconciliationFilter: reconciliationFilterFromSession(),
          daily:           period || '',
          commonUom:       _state.uomFilter || '',
          summarizeByItem: !!_state.summarize,
          filters: { itemNumber: '', branchPlant: '', location: '', lot: '' },
          take: 100000, skip: 0, page: 1, pageSize: 100000
        },
        demoFile: 'as-of'
      });
      // Demo snapshot shape: { _meta, totals, rows }.
      // Agent shape: { total, data[], aggregates, ... }.
      if (payload && Array.isArray(payload.data)) {
        _data = {
          _meta:  { period: period || '', exportedAt: new Date().toISOString(), rowCount: payload.data.length },
          totals: payload.aggregates || {},
          rows:   normalizeAsOfRows(payload.data)
        };
      } else if (payload && Array.isArray(payload.rows)) {
        _data = payload;
      } else {
        throw new Error('Unexpected response shape — no rows[] or data[]');
      }
      // Strip phantom accounts (outside operations / gl class not in
      // base table) — applies to both demo and agent paths.
      if (Array.isArray(_data.rows)) {
        const before = _data.rows.length;
        _data.rows = _data.rows.filter(r => !isExcludedAccount(r.LongAccount));
        if (_data._meta && before !== _data.rows.length) {
          _data._meta._excludedAccountRows = before - _data.rows.length;
        }
      }
    } catch (err) {
      console.error('as-of load failed:', err);
      const tbody = document.getElementById('details-tbody');
      if (tbody) {
        tbody.innerHTML = '<tr><td colspan="' + visibleColspan() + '" class="details-empty">' +
          'Couldn&rsquo;t load the As Of data &mdash; ' + escapeHtml(err.message) +
        '</td></tr>';
      }
      return;
    }
    renderAll();
  }

  function readCurrentPeriodFromCache() {
    // Mirrors RRV8.publishCurrentPeriod's scope key. Returns the most
    // recently published period across any (mode, db) tuple, or null.
    let best = null;
    try {
      for (let i = 0; i < sessionStorage.length; i++) {
        const k = sessionStorage.key(i);
        if (!k || !/^rrv8\.scope\.v1\..+\.currentPeriod$/.test(k)) continue;
        const raw = sessionStorage.getItem(k);
        if (!raw) continue;
        const obj = JSON.parse(raw);
        if (obj && obj.payload && (!best || (obj.ts || 0) > (best.ts || 0))) best = obj;
      }
    } catch (_) {}
    if (!best) return null;
    return (typeof best.payload === 'string') ? best.payload : (best.payload && best.payload.period);
  }

  // ============================================================
  //  Filtering + summarization
  //  Apply order: company -> UOM -> summarize-by-item -> search -> sort.
  // ============================================================
  function filteredRows() {
    if (!_data || !Array.isArray(_data.rows)) return [];
    let rows = _data.rows;
    if (_state.companyFilter) {
      rows = rows.filter(r => (r.CompanyNumber || '') === _state.companyFilter);
    }
    if (_state.uomFilter) {
      rows = rows.filter(r => (r.UOM || '') === _state.uomFilter);
    }
    if (_state.summarize) rows = summarizeRows(rows);
    // §9 — per-column funnel filters. Applied AFTER rollup so the
    // distinct values reflect what's actually visible in the grid.
    rows = applyColumnFilters(rows);
    return rows;
  }
  function applyColumnFilters(rows) {
    const cf = _state.columnFilters || {};
    const keys = Object.keys(cf).filter(k => cf[k] && cf[k].size);
    if (!keys.length) return rows;
    return rows.filter(r => {
      for (let i = 0; i < keys.length; i++) {
        const k = keys[i];
        const v = (r[k] == null) ? '' : String(r[k]);
        if (!cf[k].has(v)) return false;
      }
      return true;
    });
  }
  function distinctValuesForColumn(colKey) {
    // Pool = rows that pass everything except this column's own filter,
    // so unchecking values doesn't make them disappear from the picker.
    if (!_data || !Array.isArray(_data.rows)) return [];
    let rows = _data.rows;
    if (_state.companyFilter) rows = rows.filter(r => (r.CompanyNumber || '') === _state.companyFilter);
    if (_state.uomFilter)     rows = rows.filter(r => (r.UOM || '') === _state.uomFilter);
    if (_state.summarize)     rows = summarizeRows(rows);
    const cf = _state.columnFilters || {};
    const otherKeys = Object.keys(cf).filter(k => k !== colKey && cf[k] && cf[k].size);
    if (otherKeys.length) {
      rows = rows.filter(r => {
        for (let i = 0; i < otherKeys.length; i++) {
          const k = otherKeys[i];
          const v = (r[k] == null) ? '' : String(r[k]);
          if (!cf[k].has(v)) return false;
        }
        return true;
      });
    }
    const set = new Set();
    rows.forEach(r => set.add((r[colKey] == null) ? '' : String(r[colKey])));
    return Array.from(set).sort((a, b) =>
      String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' })
    );
  }
  function rollupKey(r) {
    return (r.CompanyNumber || '') + '|' +
           (r.LongAccount || '')   + '|' +
           (r.Branch || '')        + '|' +
           (r.ItemNumber || '')    + '|' +
           (r.UOM || '')           + '|' +
           (r.GLClass || '');
  }
  function summarizeRows(rows) {
    // Group by (CompanyNumber, LongAccount, Branch, ItemNumber, UOM,
    // GLClass). Sum the numeric fields; first-row carries the labels
    // for the grouped columns. Each rolled-up row carries `_lots` —
    // the raw rows that contributed to it — so the row-expand can
    // show lot-level detail without re-scanning the dataset.
    const groups = new Map();
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      const k = rollupKey(r);
      let agg = groups.get(k);
      if (!agg) {
        agg = {
          _key:          k,
          _summarized:   true,
          _lots:         [],
          CompanyNumber: r.CompanyNumber, BranchCompany: r.BranchCompany,
          LongAccount:   r.LongAccount,   Currency:      r.Currency,
          Branch:        r.Branch,        BranchDesc:    r.BranchDesc,
          ShortItem:     r.ShortItem,     ItemNumber:    r.ItemNumber,
          ThirdItem:     r.ThirdItem,     Description:   r.Description,
          UOM:           r.UOM,           GLClass:       r.GLClass,
          CurrCost:      r.CurrCost,      CalcCost:      r.CalcCost,
          ST:            r.ST,            CM:            r.CM,
          Material:      r.Material,      Labor:         r.Labor,
          Overhead:      r.Overhead,
          Quantity: 0, Amount: 0, QtyVar: 0, AmtVar: 0
        };
        groups.set(k, agg);
      }
      agg._lots.push(r);
      agg.Quantity += Number(r.Quantity) || 0;
      agg.Amount   += Number(r.Amount)   || 0;
      agg.QtyVar   += Number(r.QtyVar)   || 0;
      agg.AmtVar   += Number(r.AmtVar)   || 0;
    }
    return Array.from(groups.values());
  }
  function searchFilter(rows, q) {
    const query = String(q || '').toLowerCase().trim();
    if (!query) return rows;
    const cols = visibleColumns();
    return rows.filter(r => {
      for (let i = 0; i < cols.length; i++) {
        const v = r[cols[i].key];
        if (v == null) continue;
        if (String(v).toLowerCase().indexOf(query) !== -1) return true;
      }
      return false;
    });
  }
  function sortRows(rows, key, dir) {
    if (!key) return rows;
    const col = COLUMNS_BY_KEY[key];
    if (!col) return rows;
    const numeric = col.tdClass === 'is-money' || col.tdClass === 'is-num';
    const mult = (dir === 'desc') ? -1 : 1;
    return rows.slice().sort((a, b) => {
      const av = a[key], bv = b[key];
      if (numeric) {
        const an = Number(av);
        const bn = Number(bv);
        const ax = isFinite(an) ? an : 0;
        const bx = isFinite(bn) ? bn : 0;
        return (ax - bx) * mult;
      }
      const as = String(av == null ? '' : av);
      const bs = String(bv == null ? '' : bv);
      return as.localeCompare(bs, undefined, { numeric: true, sensitivity: 'base' }) * mult;
    });
  }

  // ============================================================
  //  Render — stats strip
  //  Reads from the filtered rows (NOT searched/sorted), so the
  //  KPI strip reflects "what's in scope" rather than "what
  //  matches my find query".
  // ============================================================
  function renderStats() {
    const rows = _viewRows || [];
    let qty = 0, amt = 0, qv = 0, av = 0;
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      qty += Number(r.Quantity) || 0;
      amt += Number(r.Amount)   || 0;
      qv  += Number(r.QtyVar)   || 0;
      av  += Number(r.AmtVar)   || 0;
    }
    setStat('stat-qty',    fmtQty(qty),   qty);
    setStat('stat-amt',    fmtMoney(amt), amt);
    setStat('stat-qtyvar', fmtQty(qv),    qv);
    setStat('stat-amtvar', fmtMoney(av),  av);
  }
  function setStat(id, txt, raw) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = txt || '0';
    el.classList.toggle('is-neg', Number(raw) < 0);
  }

  // ============================================================
  //  Render — grid
  // ============================================================
  function renderTableHeader() {
    const tr = document.getElementById('details-thead-row');
    if (!tr) return;
    const cols = visibleColumns();
    const expandCell = _state.summarize ? '<th class="col-expand" aria-label="Expand"></th>' : '';
    const cf = _state.columnFilters || {};
    const html = cols.map(c => {
      const classes = [];
      if (c.numHeader) classes.push('is-num');
      const isActive = _state.sortKey === c.key;
      if (isActive) classes.push('is-sort-active', 'is-sort-' + _state.sortDir);
      const filtered = !!(cf[c.key] && cf[c.key].size);
      if (filtered) classes.push('is-filter-active');
      const clsAttr = classes.length ? ' class="' + classes.join(' ') + '"' : '';
      const caret = isActive
        ? '<span class="sort-caret" aria-hidden="true">' + (_state.sortDir === 'desc' ? '&#9660;' : '&#9650;') + '</span>'
        : '';
      const funnel =
        '<button class="col-filter-trigger" type="button" data-action="filter-col" data-col-key="' + escapeHtml(c.key) + '" title="Filter ' + escapeHtml(c.label) + '" aria-label="Filter ' + escapeHtml(c.label) + '">' +
          '<svg viewBox="0 0 16 16" fill="' + (filtered ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<polygon points="2 3 14 3 10 8 10 13 6 11 6 8 2 3"/>' +
          '</svg>' +
        '</button>';
      return '<th' + clsAttr + ' draggable="true" data-col-key="' + escapeHtml(c.key) + '">' + escapeHtml(c.label) + caret + funnel + '</th>';
    }).join('');
    tr.innerHTML = expandCell + html;
  }
  function updateColPill() {
    const pill  = document.getElementById('col-pill');
    const label = document.getElementById('col-pill-label');
    if (!pill || !label) return;
    const total = COLUMNS.length;
    const on    = visibleColumns().length;
    label.textContent = on === total ? 'Columns' : ('Columns: ' + on + ' / ' + total);
    pill.classList.toggle('is-narrowed', on < total);
  }
  function updateUomPill() {
    const val = document.getElementById('uom-pill-value');
    const pill = document.getElementById('uom-pill');
    if (val) val.textContent = _state.uomFilter || 'All';
    if (pill) pill.classList.toggle('is-active', !!_state.uomFilter);
  }
  function updateLotDetailPill() {
    // The toggle is "Lot detail" — semantically the inverse of
    // summarize. When the analyst flips it on, we drop the rollup
    // and surface the raw per-lot rows.
    const pill = document.getElementById('lot-detail-pill');
    if (pill) pill.classList.toggle('is-active', !_state.summarize);
  }
  function updateCompanyPill() {
    const val  = document.getElementById('company-pill-value');
    const pill = document.getElementById('company-pill');
    if (val) val.textContent = _state.companyFilter || 'All';
    if (pill) pill.classList.toggle('is-active', !!_state.companyFilter);
  }
  function updateFilterBanner() {
    const bar  = document.getElementById('filter-banner');
    const text = document.getElementById('filter-banner-text');
    if (!bar || !text) return;
    const bits = [];
    if (_state.companyFilter) bits.push('Company = ' + _state.companyFilter);
    if (_state.uomFilter)     bits.push('UOM = ' + _state.uomFilter);
    if (!_state.summarize)    bits.push('lot detail');
    if (!bits.length) { bar.hidden = true; return; }
    text.textContent = bits.join(' · ');
    bar.hidden = false;
  }

  function renderDetails() {
    const tbody = document.getElementById('details-tbody');
    const count = document.getElementById('details-count');
    if (!tbody) return;
    renderTableHeader();
    updateColPill();
    _viewRows = filteredRows();
    renderStats();
    const rows = searchFilter(sortRows(_viewRows, _state.sortKey, _state.sortDir), _state.gridSearch);
    count.classList.remove('is-loading');
    const total = _data && Array.isArray(_data.rows) ? _data.rows.length : rows.length;
    count.textContent = rows.length.toLocaleString('en-US') + ' rows' +
      (rows.length < total ? ' of ' + total.toLocaleString('en-US') : '');
    const span = visibleColspan();
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="' + span + '" class="details-empty">No rows match the current filter.</td></tr>';
      return;
    }
    const MAX_RENDER = 500;
    const slice = rows.slice(0, MAX_RENDER);
    const cols = visibleColumns();
    const isRollup = _state.summarize;
    const html = slice.map((r, idx) => {
      const cells = cols.map(c => {
        const cls = c.tdClass ? ' class="' + c.tdClass + '"' : '';
        return '<td' + cls + '>' + c.render(r) + '</td>';
      }).join('');
      let expandCell = '';
      let lotDetailRow = '';
      if (isRollup) {
        const key  = r._key || '';
        const lots = r._lots || [];
        const hasLots  = lots.length > 1;
        const expanded = hasLots && _state.expanded.has(key);
        const btnClass = 'expand-btn' + (hasLots ? '' : ' is-disabled') + (expanded ? ' is-expanded' : '');
        const title    = hasLots ? (lots.length + ' lots — click to ' + (expanded ? 'collapse' : 'expand')) : 'Single lot';
        expandCell =
          '<td class="col-expand">' +
            (hasLots
              ? '<button type="button" class="' + btnClass + '" data-expand-key="' + escapeHtml(key) + '" title="' + escapeHtml(title) + '" aria-expanded="' + (expanded ? 'true' : 'false') + '">' +
                  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 4 10 8 6 12"/></svg>' +
                '</button>'
              : '<span class="' + btnClass + '" title="' + escapeHtml(title) + '">' +
                  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="1.5"/></svg>' +
                '</span>') +
          '</td>';
        if (expanded && hasLots) {
          lotDetailRow = renderLotDetailRow(r, span);
        }
      }
      return '<tr data-rollup-key="' + escapeHtml(r._key || ('_' + idx)) + '">' + expandCell + cells + '</tr>' + lotDetailRow;
    }).join('');
    let tail = '';
    if (rows.length > MAX_RENDER) {
      tail = '<tr><td colspan="' + span + '" class="details-empty">Showing first ' + MAX_RENDER +
             ' of ' + rows.length.toLocaleString('en-US') + ' rows. Narrow the filter to see more.</td></tr>';
    }
    tbody.innerHTML = html + tail;
  }

  // Lot detail rendered inside an expanded item row. Shows the
  // contributing raw rows (Branch / Location / Lot / LotStatus /
  // LotExp / UOM / Quantity / Amount). When the snapshot has no
  // per-lot rows (e.g. items already pre-aggregated upstream), the
  // table renders a single row per contributor — still useful as
  // confirmation that the rollup matches the source.
  function renderLotDetailRow(rolled, span) {
    const lots = rolled._lots || [];
    if (!lots.length) return '';
    const headerCells = [
      '<th>Location</th>', '<th>Lot</th>', '<th>Lot Status</th>',
      '<th>Lot Exp</th>', '<th>UOM</th>',
      '<th class="is-num">Quantity</th>', '<th class="is-num">Amount</th>',
      '<th class="is-num">QtyVar</th>', '<th class="is-num">AmtVar</th>'
    ].join('');
    const rows = lots.map(l => {
      return '<tr>' +
        '<td>' + escapeHtml(l.Location || '') + '</td>' +
        '<td>' + escapeHtml(l.Lot || '') + '</td>' +
        '<td>' + escapeHtml(l.LotStatus || '') + '</td>' +
        '<td>' + escapeHtml(l.LotExp || '') + '</td>' +
        '<td>' + escapeHtml(l.UOM || '') + '</td>' +
        '<td class="is-num">' + (l.Quantity ? qtyCell(l.Quantity) : '<span style="color:var(--text-muted)">&mdash;</span>') + '</td>' +
        '<td class="is-num">' + (l.Amount   ? moneyCell(l.Amount) : '<span style="color:var(--text-muted)">&mdash;</span>') + '</td>' +
        '<td class="is-num">' + (l.QtyVar   ? qtyCell(l.QtyVar)   : '<span style="color:var(--text-muted)">&mdash;</span>') + '</td>' +
        '<td class="is-num">' + (l.AmtVar   ? moneyCell(l.AmtVar) : '<span style="color:var(--text-muted)">&mdash;</span>') + '</td>' +
      '</tr>';
    }).join('');
    return '<tr class="lot-detail-row"><td colspan="' + span + '">' +
      '<div class="lot-detail-wrap">' +
        '<div class="lot-detail-header">' + lots.length + ' contributing rows</div>' +
        '<table class="lot-detail-table">' +
          '<thead><tr>' + headerCells + '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
    '</td></tr>';
  }
  function renderAll() {
    if (!_data) return;
    updateCompanyPill();
    updateUomPill();
    updateLotDetailPill();
    updateFilterBanner();
    renderDetails();
    // Publish current period + repaint sidebar so the Period row reflects
    // this page's period (and the next page sees it via the same cache).
    const period = _data && _data._meta && _data._meta.period;
    if (period && window.RRV8 && typeof window.RRV8.publishCurrentPeriod === 'function') {
      window.RRV8.publishCurrentPeriod(period);
    }
    if (window.RRV8 && typeof window.RRV8.paintSidebarFromCache === 'function') {
      window.RRV8.paintSidebarFromCache();
    }
  }

  // ============================================================
  //  Popovers
  // ============================================================
  function hideAllPopovers() {
    document.querySelectorAll('.popover').forEach(p => { p.hidden = true; p.dataset.group = ''; });
  }
  document.addEventListener('click', (e) => {
    if (e.target.closest('.popover')) return;
    if (e.target.closest('[data-pop-anchor]')) return;
    hideAllPopovers();
  });
  function positionPopover(pop, anchor, opts) {
    opts = opts || {};
    pop.hidden = false;
    // First make it visible to measure, then place.
    const rect = anchor.getBoundingClientRect();
    const popRect = pop.getBoundingClientRect();
    let top  = rect.bottom + 6;
    let left = rect.left;
    if (opts.align === 'right') left = rect.right - popRect.width;
    // Clamp inside viewport
    const margin = 8;
    if (left + popRect.width > window.innerWidth - margin) left = window.innerWidth - margin - popRect.width;
    if (left < margin) left = margin;
    if (top + popRect.height > window.innerHeight - margin) {
      top = Math.max(margin, rect.top - popRect.height - 6);
    }
    pop.style.top  = top  + 'px';
    pop.style.left = left + 'px';
  }

  // ----- Column chooser popover -----
  const colPill = document.getElementById('col-pill');
  function buildColPopover() {
    const pop = document.getElementById('filter-popover');
    if (!pop) return;
    pop.dataset.group = '__col-vis';
    const items = _state.colOrder.map(k => {
      const c = COLUMNS_BY_KEY[k];
      if (!c) return '';
      const on = !!_state.colVisibility[c.key];
      return '<label class="col-vis-row' + (on ? '' : ' is-muted') + '" data-col-key="' + escapeHtml(c.key) + '">' +
        '<input type="checkbox"' + (on ? ' checked' : '') + '>' +
        '<span class="col-vis-label">' + escapeHtml(c.label) + '</span>' +
      '</label>';
    }).join('');
    pop.innerHTML =
      '<div class="popover-section-label">Show columns</div>' +
      '<div class="popover-row" data-col-action="all">Show all</div>' +
      '<div class="popover-row" data-col-action="reset">Reset to defaults</div>' +
      '<div class="col-vis-list">' + items + '</div>';
    pop.querySelector('[data-col-action="all"]').addEventListener('click', () => {
      COLUMNS.forEach(c => { _state.colVisibility[c.key] = true; });
      saveColVisibility();
      buildColPopover();
      positionPopover(pop, colPill, { align: 'right' });
      renderDetails();
    });
    pop.querySelector('[data-col-action="reset"]').addEventListener('click', () => {
      COLUMNS.forEach(c => { _state.colVisibility[c.key] = c.defaultOn; });
      _state.colOrder = COLUMNS.map(c => c.key);
      saveColVisibility();
      saveColOrder();
      buildColPopover();
      positionPopover(pop, colPill, { align: 'right' });
      renderDetails();
    });
    pop.querySelectorAll('.col-vis-row').forEach(row => {
      row.addEventListener('click', (ev) => {
        ev.stopPropagation();
        setTimeout(() => {
          const cb  = row.querySelector('input[type="checkbox"]');
          const key = row.dataset.colKey;
          if (!cb || !key) return;
          _state.colVisibility[key] = cb.checked;
          row.classList.toggle('is-muted', !cb.checked);
          saveColVisibility();
          renderDetails();
        }, 0);
      });
    });
  }
  if (colPill) {
    colPill.setAttribute('data-pop-anchor', 'col');
    colPill.addEventListener('click', (e) => {
      e.stopPropagation();
      const pop = document.getElementById('filter-popover');
      if (!pop) return;
      const wasOpen = !pop.hidden && pop.dataset.group === '__col-vis';
      hideAllPopovers();
      if (wasOpen) return;
      buildColPopover();
      positionPopover(pop, colPill, { align: 'right' });
    });
  }

  // ----- UOM dropdown popover -----
  const uomPill = document.getElementById('uom-pill');
  function buildUomPopover() {
    const pop = document.getElementById('filter-popover');
    if (!pop || !_data) return;
    pop.dataset.group = '__uom';
    // Count rows per UOM in the unfiltered data, sorted by frequency.
    const counts = new Map();
    (_data.rows || []).forEach(r => {
      const u = (r.UOM || '').trim();
      if (!u) return;
      counts.set(u, (counts.get(u) || 0) + 1);
    });
    const uoms = Array.from(counts.entries()).sort((a, b) => b[1] - a[1]);
    const allRow = '<div class="uom-row' + (_state.uomFilter ? '' : ' is-selected') + '" data-uom="">' +
                     '<span>All UOMs</span>' +
                     '<span class="uom-count">' + (_data.rows || []).length.toLocaleString('en-US') + '</span>' +
                   '</div>';
    const items = uoms.map(([u, c]) =>
      '<div class="uom-row' + (_state.uomFilter === u ? ' is-selected' : '') + '" data-uom="' + escapeHtml(u) + '">' +
        '<span>' + escapeHtml(u) + '</span>' +
        '<span class="uom-count">' + c.toLocaleString('en-US') + '</span>' +
      '</div>'
    ).join('');
    pop.innerHTML =
      '<div class="popover-section-label">Common UOM</div>' +
      '<div class="uom-list">' + allRow + items + '</div>';
    pop.querySelectorAll('.uom-row').forEach(row => {
      row.addEventListener('click', () => {
        const u = row.dataset.uom || '';
        _state.uomFilter = u;
        saveUom();
        hideAllPopovers();
        renderAll();
      });

  if (uomPill) {
    uomPill.setAttribute('data-pop-anchor', 'uom');
    uomPill.addEventListener('click', (e) => {
      e.stopPropagation();
      const pop = document.getElementById('filter-popover');
      if (!pop) return;
      const wasOpen = !pop.hidden && pop.dataset.group === '__uom';
      hideAllPopovers();
      if (wasOpen) return;
      buildUomPopover();

  // ----- Lot detail toggle (inverse of summarize) -----
  const lotDetailPill = document.getElementById('lot-detail-pill');
  if (lotDetailPill) {
    lotDetailPill.addEventListener('click', () => {
      _state.summarize = !_state.summarize;
      // Collapse any open expansions when leaving rollup mode so the
      // analyst doesn't get stale rows on toggle-back.

  // ----- Row-expand (delegated) -----
  document.addEventListener('click', (e) => {

    if (!expandBtn) return;
